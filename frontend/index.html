<!DOCTYPE html>
<html>
<body>

<h2>Employee System</h2>

<button onclick="getEmployees()">Get Employees</button>

<pre id="result"></pre>

<script>
function getEmployees() {
    fetch("/api/employees")
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
